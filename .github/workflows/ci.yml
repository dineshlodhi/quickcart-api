name: Continuous Integration

# Trigger this workflow on every push and pull request to any branch
on:
  push:
  pull_request:

jobs:
  build-and-test:
    # Run the job on a fresh Ubuntu Linux virtual machine provided by GitHub
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the repository code into the runner's workspace
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Node.js and enable dependency caching
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # This tells setup-node to cache the ~/.npm directory

      # 3. DIAGNOSTIC: probe the runner's network path to the npm registry.
      # The identical `npm ci` runs in 7s in a Linux container but hangs 5+ min
      # here, so the suspect is this runner's network (e.g. an IPv6 route to the
      # registry that blackholes and stalls every request until timeout).
      # This step never fails the job — it just prints what it finds.
      - name: Network diagnostics
        continue-on-error: true
        run: |
          echo "=== npm registry config ==="
          npm config get registry
          echo "=== proxy env vars ==="
          env | grep -i proxy || echo "(none)"
          echo "=== DNS for registry.npmjs.org ==="
          getent ahosts registry.npmjs.org || true
          echo "=== curl over IPv4 ==="
          curl -4 -sS -o /dev/null -w 'ipv4: HTTP %{http_code} in %{time_total}s\n' --max-time 30 https://registry.npmjs.org/express || echo "ipv4 FAILED/timeout"
          echo "=== curl over IPv6 ==="
          curl -6 -sS -o /dev/null -w 'ipv6: HTTP %{http_code} in %{time_total}s\n' --max-time 30 https://registry.npmjs.org/express || echo "ipv6 FAILED/timeout (this would explain the hang)"
          echo "=== single npm registry op (bounded 60s) ==="
          timeout 60 npm view express version || echo "npm view FAILED/timeout"

      # 4. Install dependencies with fail-fast network settings + full logging.
      # Short fetch-timeout/retries mean a stalled connection errors in seconds
      # (and retries) instead of hanging ~5 min per request. This both diagnoses
      # (silly log shows the exact URL it stalls on) and may fix the hang.
      # On any exit, we dump npm's own debug log so the failure is visible.
      - name: Install dependencies
        run: |
          set +e
          timeout --signal=KILL 180 npm ci --ignore-scripts --include=dev \
            --no-audit --no-fund \
            --fetch-timeout=30000 --fetch-retries=2 \
            --fetch-retry-mintimeout=5000 --fetch-retry-maxtimeout=30000 \
            --loglevel silly
          code=$?
          echo "=== npm exit code: $code ==="
          echo "=== npm debug log (last 120 lines) ==="
          cat ~/.npm/_logs/*-debug-*.log 2>/dev/null | tail -120 || echo "(no debug log found)"
          exit $code

      # 4. Verify there are no TypeScript compilation errors
      - name: Run Type Check
        run: npm run typecheck

      # 5. Verify the code passes all ESLint rules
      - name: Run Linter
        run: npm run lint

      # 6. Compile the TypeScript source into JavaScript inside dist/
      - name: Build Application
        run: npm run build

      # 7. Verify the production Dockerfile is valid and builds successfully.
      # We do not push this image anywhere; we simply ensure the build doesn't crash.
      - name: Verify Docker Build
        run: docker build -t mini-zepto-test .
